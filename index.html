<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Surprise nè!</title>
    <style>
        body {
            background: linear-gradient(135deg, #fceaf1 0%, #e8f5ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #4a4a4a;
        }

        .page {
            display: none; 
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
            padding: 20px;
        }

        .active { 
            display: block !important; 
        } 

        .btn-group button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background-color: #ff85a2;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
        }

        .btn-group button:hover { 
            transform: scale(1.1) translateY(-3px);
            background-color: #ff6b8d;
        }

        /* Khung chứa danh sách ảnh */
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Khung nhỏ bao bọc từng cái ảnh và nút bấm đi kèm */
        .img-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            animation: bounce 2s infinite ease-in-out;
        }

        .gallery img {
            width: 180px;
            height: auto;
            border-radius: 12px;
            object-fit: cover;
        }

        /* Nút tải xuống dưới mỗi ảnh */
        .download-btn {
            margin-top: 10px;
            padding: 8px 15px;
            font-size: 14px;
            border: none;
            border-radius: 15px;
            background-color: #4ed1a1;
            color: white;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(78, 209, 161, 0.3);
        }

        .download-btn:hover {
            transform: scale(1.05);
            background-color: #3cb88f;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-8px); } 
        }

        .hidden { display: none; }
        #ple-text {
            color: #ff4757;
            font-size: 60px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
