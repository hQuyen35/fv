<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Surprise nè!</title>
    <!-- Bé nhét thẳng CSS vào đây để Cốc Cốc không chặn được nữa nè -->
    <style>
        body {
            background: linear-gradient(135deg, #fceaf1 0%, #e8f5ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #4a4a4a;
        }

        .page {
            display: none; 
            text-align: center;
            animation: fadeIn 0.8s ease-in-out;
            padding: 20px;
        }

        .active { 
            display: block !important; 
        } 

        .btn-group button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 18px;
            border: none;
            border-radius: 25px;
            background-color: #ff85a2;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
        }

        .btn-group button:hover { 
            transform: scale(1.1) translateY(-3px);
            background-color: #ff6b8d;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
        }

        .gallery img {
            width: 180px;
            height: auto;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: bounce 2s infinite ease-in-out;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        @keyframes bounce { 
            0%, 100% { transform: translateY(0); } 
            50% { transform: translateY(-10px); } 
        }

        .hidden { display: none; }
        #ple-text {
            color: #ff4757;
            font-size: 60px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <audio id="bg-music" loop>
        <source src="amthanh.m4a" type="audio/mp4">
    </audio>

    <div id="app">
        <!-- Trang 1 -->
        <section id="page1" class="page active">
            <h1>Nay là ngày mấy? 🤔</h1>
            <div class="btn-group">
                <button onclick="nextPage(2)">1/6</button>
                <button onclick="nextPage(2)">Quốc tế thiếu nhi</button>
            </div>
        </section>

        <!-- Trang 2 -->
        <section id="page2" class="page">
            <h1>Tôi là... 😶‍🌫️</h1>
            <div class="btn-group">
                <button onclick="nextPage(3)">Chó 🐶</button>
                <button onclick="nextPage(3)">Tôm 🦐</button>
            </div>
        </section>

        <!-- Trang 3 -->
        <section id="page3" class="page">
            <h1 class="wish-text">Chúc bạn 1/6 vui vẻ, luôn cười thật nhiều và gặp thật nhiều điều may mắn nha!💖🎉</h1>
            <div class="btn-group">
                <button onclick="nextPage(4)">Tiếp tục</button>
                <button onclick="showPle()">Hết</button>
            </div>
            <p id="ple-text" class="hidden">plè 😛</p>
        </section>

        <!-- Trang 4 -->
        <section id="page4" class="page">
            <h1>My Gallery ✨</h1>
            <div class="gallery">
                <img src="anh1.jpg" alt="Me">
                <img src="anh2.jpg" alt="Me">
                <img src="anh2cm16.jpg" alt="Me">
                <img src="anh3.jpg" alt="Me">
                <img src="anh4.jpg" alt="Me">
                <img src="anh5.jpg" alt="Me">
                <img src="anh6.jpg" alt="Me">
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
